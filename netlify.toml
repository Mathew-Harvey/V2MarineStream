[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/core-pages/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/core-pages/blog.html"
  to = "/portfolio"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/portfolio"
  status = 301

[[redirects]]
  from = "/blog/"
  to = "/portfolio"
  status = 301

[[redirects]]
  from = "/core-pages/sales.html"
  to = "/services"
  status = 301

[[redirects]]
  from = "/sales"
  to = "/services"
  status = 301

[[redirects]]
  from = "/sales/"
  to = "/services"
  status = 301

[[redirects]]
  from = "/sales/hardware"
  to = "/services/hardware"
  status = 301

[[redirects]]
  from = "/sales/software"
  to = "/services/software"
  status = 301

[[redirects]]
  from = "/sales/training"
  to = "/services/training"
  status = 301

[[redirects]]
  from = "/sales/professional-services"
  to = "/services/professional-services"
  status = 301

[[redirects]]
  from = "/core-pages/equipment-products.html"
  to = "/services/hardware"
  status = 301

[[redirects]]
  from = "/core-pages/consultation-training.html"
  to = "/services/training"
