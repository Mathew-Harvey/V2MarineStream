[[redirects]]
  from = "/core-pages/software-platform.html"
  to = "/services/software"
  status = 301

[[redirects]]
  from = "/core-pages/biofouling-management.html"
  to = "/services/cleaning"
  status = 301

[[redirects]]
  from = "/core-pages/rov-systems.html"
  to = "/services/inspection"
  status = 301

[[redirects]]
  from = "/core-pages/crawler-systems.html"
  to = "/services/cleaning"
  status = 301

[[redirects]]
  from = "/core-pages/meet-the-team.html"
  to = "/about"
  status = 301

[[redirects]]
  from = "/core-pages/privacy.html"
  to = "/privacy"
  status = 301

[[redirects]]
  from = "/blog/revolutionising-underwater-inspections/*"
  to = "/blog/revolutionising-underwater-inspections"
  status = 301

[[redirects]]
  from = "/blog/BeyondTheSurface/*"
  to = "/blog/beyond-the-surface"
  status = 301

[[redirects]]
  from = "/blog/PreventativeAdvantage/*"
  to = "/blog/preventative-advantage"
  status = 301

[[redirects]]
  from = "/blog/FromRovToRemote/*"
  to = "/blog/from-rov-to-remote"
  status = 301

[[redirects]]
  from = "/blog/TheHullTruth/*"
  to = "/blog/the-hull-truth"
  status = 301

[[redirects]]
  from = "/blog/CleanHullsClearWaters/*"
  to = "/blog/clean-hulls-clear-waters"
  status = 301

[[redirects]]
  from = "/BiofoulingIdGuide/*"
  to = "/tools/ims-species-guide/:splat"
  status = 301

[[redirects]]
  from = "/tools/ims-species-guide"
  to = "/tools/ims-species-guide/"
  status = 301

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
