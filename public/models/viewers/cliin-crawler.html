<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CLIIN Crawler · MarineStream</title>
<style>
  :root {
    --panel: rgba(10, 23, 33, 0.78);
    --panel-border: rgba(255, 255, 255, 0.1);
    --text: #eef2f4;
    --muted: #a7b3bc;
    --accent: #ff6600;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    font-family: "Space Grotesk", "Inter", system-ui, sans-serif;
    color: var(--text);
    background: radial-gradient(ellipse at 50% 28%, #163548 0%, #0a1721 58%, #061018 100%);
  }
  #app { position: absolute; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  .hud {
    position: absolute; z-index: 2;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  #hint {
    left: 12px; bottom: 12px;
    padding: 8px 12px;
    font-size: 11.5px;
    color: var(--muted);
    max-width: 300px;
    line-height: 1.45;
  }
  #hint b { color: var(--text); font-weight: 600; }
  #controls {
    top: 12px; right: 12px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 148px;
  }
  .btn {
    appearance: none;
    border: 1px solid var(--panel-border);
    color: inherit;
    background: rgba(255,255,255,0.04);
    padding: 7px 9px;
    border-radius: 7px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .btn:hover { background: rgba(255, 102, 0, 0.16); border-color: rgba(255, 102, 0, 0.45); }
  .btn .state { font-size: 10.5px; color: var(--muted); }
  .btn.active { border-color: var(--accent); background: rgba(255, 102, 0, 0.18); }
  .btn.active .state { color: var(--accent); }
  #loader {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; gap: 14px;
    align-items: center; justify-content: center;
    background: rgba(6, 16, 24, 0.72);
    transition: opacity .4s;
  }
  .spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent);
    animation: spin .9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader .lbl { font-size: 13px; color: var(--muted); }
  #err { color: #ff8080; font-size: 13px; max-width: 420px; text-align: center; padding: 0 16px; }
  @media (max-width: 640px) {
    #controls { width: auto; flex-direction: row; flex-wrap: wrap; max-width: calc(100% - 24px); }
    #controls .btn .state { display: none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" />
</head>
<body>
  <div id="app"></div>
  <div id="controls" class="hud">
    <button class="btn" id="btnReset" type="button">Reset view</button>
    <button class="btn active" id="btnFloats" type="button">Floats <span class="state">shown</span></button>
    <button class="btn active" id="btnRotate" type="button">Auto-rotate <span class="state">on</span></button>
    <button class="btn" id="btnWire" type="button">Wireframe <span class="state">off</span></button>
  </div>
  <div id="hint" class="hud"><b>Explore</b> drag to orbit · scroll to zoom · right-drag to pan</div>
  <div id="loader">
    <div class="spinner"></div>
    <div class="lbl" id="loaderLbl">Loading CLIIN crawler…</div>
    <div id="err"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.min.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const app = document.getElementById('app');
    const loaderEl = document.getElementById('loader');
    const loaderLbl = document.getElementById('loaderLbl');
    const errEl = document.getElementById('err');

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(42, 1, 0.01, 100);
    camera.position.set(1, 0.8, 1.4);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.9;

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
    scene.add(new THREE.HemisphereLight(0xffffff, 0x2a3a45, 0.55));
    const key = new THREE.DirectionalLight(0xffffff, 2.0);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.bias = -0.0004;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xb8d4e8, 0.55);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xff8533, 0.3);
    rim.position.set(-2, 1.2, -1);
    scene.add(rim);

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.ShadowMaterial({ opacity: 0.32 }));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    let model = null;
    const home = new THREE.Vector3();
    const meshes = [];
    const floatMeshes = [];

    function sizeTo() {
      const w = app.clientWidth || window.innerWidth;
      const h = app.clientHeight || window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }

    function frameModel() {
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      ground.position.y = box.min.y;
      key.position.set(center.x + maxDim, center.y + maxDim * 1.5, center.z + maxDim * 0.85);
      key.target.position.copy(center);
      scene.add(key.target);
      const sc = key.shadow.camera, r = maxDim * 1.3;
      sc.left = -r; sc.right = r; sc.top = r; sc.bottom = -r;
      sc.near = 0.01; sc.far = maxDim * 6; sc.updateProjectionMatrix();
      fill.position.set(center.x - maxDim, center.y + maxDim * 0.4, center.z - maxDim);
      const fov = camera.fov * Math.PI / 180;
      let dist = (maxDim / 2) / Math.tan(fov / 2);
      dist *= 1.5;
      camera.near = dist / 100;
      camera.far = dist * 100;
      camera.updateProjectionMatrix();
      controls.target.copy(center);
      home.copy(center).add(new THREE.Vector3(1.0, 0.55, 1.1).normalize().multiplyScalar(dist));
      camera.position.copy(home);
      controls.update();
    }

    function fail(msg) {
      document.querySelector('#loader .spinner').style.display = 'none';
      loaderLbl.style.display = 'none';
      errEl.textContent = msg;
    }

    const draco = new DRACOLoader();
    draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');
    const gltfLoader = new GLTFLoader();
    gltfLoader.setDRACOLoader(draco);

    gltfLoader.load(
      '../cliin-crawler.glb',
      (gltf) => {
        model = gltf.scene;
        model.traverse((o) => {
          if (!o.isMesh) return;
          if (!o.geometry.attributes.normal) o.geometry.computeVertexNormals();
          o.material = new THREE.MeshStandardMaterial({
            vertexColors: true,
            metalness: 0.22,
            roughness: 0.6,
            side: THREE.DoubleSide,
            envMapIntensity: 0.95,
          });
          o.castShadow = true;
          o.receiveShadow = true;
          meshes.push(o);
          if (o.name && o.name.toLowerCase().includes('floats')) floatMeshes.push(o);
        });
        scene.add(model);
        sizeTo();
        frameModel();
        loaderEl.style.opacity = '0';
        setTimeout(() => loaderEl.remove(), 450);
        animate();
      },
      (ev) => {
        if (ev.total) loaderLbl.textContent = `Loading CLIIN crawler… ${Math.round((ev.loaded / ev.total) * 100)}%`;
      },
      (e) => fail('Could not load CLIIN crawler model. ' + (e?.message || e))
    );

    document.getElementById('btnReset').onclick = () => {
      if (!model) return;
      camera.position.copy(home);
      controls.target.copy(new THREE.Box3().setFromObject(model).getCenter(new THREE.Vector3()));
      controls.update();
    };
    document.getElementById('btnRotate').onclick = (e) => {
      controls.autoRotate = !controls.autoRotate;
      e.currentTarget.classList.toggle('active', controls.autoRotate);
      e.currentTarget.querySelector('.state').textContent = controls.autoRotate ? 'on' : 'off';
    };
    let wire = false;
    document.getElementById('btnWire').onclick = (e) => {
      wire = !wire;
      meshes.forEach((m) => { if (m.material) m.material.wireframe = wire; });
      e.currentTarget.classList.toggle('active', wire);
      e.currentTarget.querySelector('.state').textContent = wire ? 'on' : 'off';
    };
    document.getElementById('btnFloats').onclick = (e) => {
      const showing = floatMeshes.length ? floatMeshes[0].visible : true;
      floatMeshes.forEach((m) => { m.visible = !showing; });
      e.currentTarget.classList.toggle('active', !showing);
      e.currentTarget.querySelector('.state').textContent = !showing ? 'shown' : 'hidden';
    };

    controls.addEventListener('start', () => {
      controls.autoRotate = false;
      const b = document.getElementById('btnRotate');
      if (b) {
        b.classList.remove('active');
        b.querySelector('.state').textContent = 'off';
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', sizeTo);
    sizeTo();
  </script>
</body>
</html>
